<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{alumno/menuAlumno}"
>
  <head>
    <title>Mi Perfil — Schooledule</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="profile-block">
        <div class="profile-field animate-in">
          <span class="profile-field__label">Nombre Completo</span>
          <span
            class="profile-field__value"
            th:text="${profile.nombre + ' ' + profile.apellidos}"
            >Nombre del Alumno</span
          >
        </div>

        <div class="profile-field animate-in">
          <span class="profile-field__label">Correo Electrónico</span>
          <span class="profile-field__value" th:text="${profile.email}"
            >email@ejemplo.com</span
          >
        </div>

        <div class="profile-field animate-in">
          <span class="profile-field__label">Nombre de Usuario</span>
          <span class="profile-field__value" th:text="${profile.username}"
            >username</span
          >
        </div>

        <div class="profile-field animate-in">
          <span class="profile-field__label">Centro Educativo</span>
          <span class="profile-field__value" th:text="${profile.centroNombre}"
            >Nombre del Centro</span
          >
        </div>

        <div class="profile-field animate-in">
          <span class="profile-field__label">Grupo de Clase</span>
          <span class="profile-field__value" th:text="${profile.grupoNombre}"
            >Nombre del Grupo</span
          >
        </div>

        <div class="profile-field animate-in">
          <span class="profile-field__label">Curso Académico</span>
          <span class="profile-field__value" th:text="${profile.cursoAcademico}"
            >2025/2026</span
          >
        </div>
      </div>

      <div class="btn-group animate-in" style="margin-top: 3rem">
        <a href="/alumno/dashboard" class="btn-editorial-ghost"
          >Volver al Dashboard</a
        >
      </div>
    </div>
  </body>
</html>
