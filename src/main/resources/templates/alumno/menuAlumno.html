<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menú Alumno - Schooledule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .menu-card { 
            transition: transform 0.2s; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            height: 100%;
        }
        .menu-card:hover { transform: translateY(-5px); }
        .icon-box { 
            font-size: 3rem; 
            margin-bottom: 1rem; 
            color: #007bff; 
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/alumno/dashboard">Schooledule</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/alumno/perfil">Mi Perfil</a>
            <a class="nav-link" href="/alumno/notas">Mis Notas</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-link nav-link">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="text-center mb-5">
        <h1>Bienvenido a Schooledule</h1>
        <p class="lead">Gestiona tu información académica de forma sencilla</p>
    </div>

    <div class="row g-4 justify-content-center">
        <!-- Card Perfil -->
        <div class="col-md-4">
            <a href="/alumno/perfil" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4">
                    <div class="icon-box">👤</div>
                    <h3>Mi Perfil</h3>
                    <p class="text-muted">Consulta tus datos personales y de matriculación.</p>
                </div>
            </a>
        </div>

        <!-- Card Notas -->
        <div class="col-md-4">
            <a href="/alumno/notas" class="text-decoration-none text-dark">
                <div class="card menu-card text-center p-4">
                    <div class="icon-box">📊</div>
                    <h3>Mis Notas</h3>
                    <p class="text-muted">Sigue tu progreso académico y consulta tus calificaciones.</p>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
