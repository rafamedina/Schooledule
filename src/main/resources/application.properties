spring.application.name=Schooledule
server.port=8081

# CONEXION (Asegurate que coincide con lo que acabamos de poner en el Paso 1)
spring.datasource.url=jdbc:postgresql://localhost:5433/schooledule
spring.datasource.username=postgres
spring.datasource.password=root123

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONFIGURACION CRITICA PARA ARREGLAR EL ERROR ---
spring.session.store-type=jdbc
# Pon esto en NEVER. Le dice a Spring: "No intentes crear tablas de sesion al iniciar, ya lo hare yo".
# Indispensable: Crea la tabla de historial si el esquema no está vacío
spring.flyway.baseline-on-migrate=true

# Define desde qué versión empezar (normalmente 1 para tu primer script)
spring.flyway.baseline-version=0

# Asegúrate de que Hibernate no intente crear tablas por su cuenta y choque con Flyway
