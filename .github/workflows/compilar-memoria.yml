name: Compilar Memoria TFG (LaTeX)

on:
  push:
    paths:
      - "memoria/**"
      - ".github/workflows/compilar-memoria.yml"
  workflow_dispatch: # Permite ejecución manual

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: memoria
          # Instalamos dependencias comunes para TFG
          args: "-pdf -interaction=nonstopmode -halt-on-error -shell-escape"

      - name: Subir PDF como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Memoria_TFG_Schooledule
          path: memoria/main.pdf
          if-no-files-found: error
