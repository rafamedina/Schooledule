<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{alumno/menuAlumno}"
>
  <head>
    <title>Calificaciones — Schooledule</title>
  </head>
  <body>
    <div layout:fragment="content">

      <form class="periodo-selector-form animate-in" method="get" th:action="@{/alumno/notas}">
        <select name="periodoId" onchange="this.form.submit()">
          <option
            th:each="p : ${periodos}"
            th:value="${p.id}"
            th:text="${p.nombre}"
            th:selected="${p.id == selectedPeriodoId}"
          >
            Periodo
          </option>
        </select>
        <p class="masthead__subtitle" style="margin-top: 0.5rem;">Periodo de Evaluación</p>
      </form>

      <div th:if="${dashboard == null || dashboard.gradesByModulo.isEmpty()}" class="empty-state animate-in">
        <h2 class="empty-state__title">No hay notas publicadas.</h2>
        <p class="empty-state__body">No se han encontrado calificaciones para el periodo seleccionado.</p>
      </div>

      <div th:if="${dashboard != null}" th:each="entry : ${dashboard.gradesByModulo}" class="modulo-block animate-in">
        <h2 class="modulo-title" th:text="${entry.key}">Nombre del Módulo</h2>

        <table class="ce-table">
          <thead>
            <tr>
              <th>Actividad</th>
              <th>Tipo</th>
              <th>Fecha</th>
              <th style="text-align: right;">Nota</th>
              <th>Comentario</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="grade : ${entry.value}">
              <td class="ce-table__desc" th:text="${grade.itemNombre}">Examen Tema 1</td>
              <td>
                <span class="chip" th:text="${grade.tipoActividad}">TIPO</span>
              </td>
              <td class="ce-table__desc" th:text="${grade.fecha}">2026-02-25</td>
              <td style="text-align: right;">
                <span class="nota-badge"
                      th:text="${grade.valor}"
                      th:classappend="${grade.valor != null && grade.valor < 5 ? 'nota-badge--fail' : 'nota-badge--pass'}">
                  8.50
                </span>
              </td>
              <td class="ce-table__desc" th:text="${grade.comentario}">Buen trabajo</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </body>
</html>
